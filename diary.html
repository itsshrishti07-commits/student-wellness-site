    <div class="container">
        <section class="card">
            <h2>Your Personal Diary</h2>
            <p>Write down how you feel today. Only you can see this.</p>
            <textarea id="diaryInput" rows="5" placeholder="Dear Diary..."></textarea>
            <button class="btn" onclick="saveDiary()">Save Entry</button>
            <button class="btn" style="background: #ccc;" onclick="clearDiary()">Clear All</button>
        </section>

        <div id="diaryEntries">
            <!-- Entries will appear here -->
        </div>
    </div>
